  type: paper
  description: "For this paper, we aimed to study prophages in the human gut microbiome using long-read sequencing. 
    How stable are prophages in their bacterial hosts? How broad are prophage host ranges? What type of integration 
    strategies do prophages use in the gut? Read more if you also want to learn about a new class of 'IScream phages'
    that we discovered."
