- id: doi:10.1038/s41591-019-0406-6
  type: paper
  description: "In this study, we asked if microbial biomarkers for colorectal cancer are generalizable 
    across different datasets, populations, and geographies. We found a set of bacterial species that
    were highly enriched in colorectal cancer metagenomes and could train an accurate and
    specific machine learning model for the detection of colorectal cancer."
